# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name staging.learngazar.online;
    return 301 https://$host$request_uri;
}
# HTTPS server
server {
    listen 443 ssl;
    server_name staging.learngazar.online;
    ssl_certificate     /etc/letsencrypt/live/staging.learngazar.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.learngazar.online/privkey.pem;
    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    # API requests → backend container
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Everything else → frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}