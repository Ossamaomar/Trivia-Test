services:
  frontend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-frontend:latest
    restart: unless-stopped
    expose:
      - "80"

  backend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-backend:latest
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - CORS_ORIGINS=https://learngazar.online,http://localhost:80
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend

