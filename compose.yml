version: "3.9"

services:
  frontend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-frontend:latest
    # restart: always
    expose:
      - "80"

  backend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-backend:latest
    # restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb+srv://root:pass123@cluster0.386c3z5.mongodb.net/?appName=Cluster0
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  pgdata: