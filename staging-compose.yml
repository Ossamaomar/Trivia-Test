services:
  frontend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-frontend:staging
    expose:
      - "80"

  backend:
    image: 964993353079.dkr.ecr.eu-west-3.amazonaws.com/trivia-backend:staging
    expose:
      - "3000"
    environment:
      - NODE_ENV=staging
      - MONGODB_URI=${MONGODB_URI}    # could point to a separate test DB
      - CORS_ORIGINS=https://staging.learngazar.online,http://localhost:80

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"                       # different external port!
      - "443:443"                     # different external port!
    volumes:
      - ./staging-nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - frontend
      - backend
