server {
    listen 80;

    # API requests → backend container
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Everything else → frontend container
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}