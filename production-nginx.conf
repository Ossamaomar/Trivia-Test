# Redirect ALL HTTP → HTTPS (both www + non-www)
server {
    listen 80;
    server_name learngazar.online www.learngazar.online;

    return 301 https://learngazar.online$request_uri;
}

# Redirect HTTPS www → non-www
server {
    listen 443 ssl;
    server_name www.learngazar.online;

    ssl_certificate     /etc/letsencrypt/live/learngazar.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learngazar.online/privkey.pem;

    return 301 https://learngazar.online$request_uri;
}

# Main HTTPS server (ONLY non-www)
server {
    listen 443 ssl;
    server_name learngazar.online;

    ssl_certificate     /etc/letsencrypt/live/learngazar.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learngazar.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}